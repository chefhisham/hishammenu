<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chef Hisham Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#2c3e50;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Chef Hisham Admin</h1>
<h2 style="color:red">NEW VERSION TEST</h2>

<input id="name" placeholder="Dessert Name">

<textarea id="description" placeholder="Description"></textarea>



<select id="category">
<option value="arabic">Arabic</option>
<option value="Special">Special Cake</option>
<option value="bakery">Bakery</option>
<option value="tart">Tart</option>
<option value="birthday">Birthday Cake</option>
<option value="ramadan">Ramadan</option>
</select>

<input type="file" id="image">

<button onclick="saveDessert()">Save Dessert</button>

<p id="status"></p>

<script>

const SUPABASE_URL =
"https://vtkdybaprivwqgwnsvmz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_U7rlQfGEce347w4_POFU_Q_XYtlrJbW";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function saveDessert(){

const file =
document.getElementById("image").files[0];

if(!file){
alert("Choose image");
return;
}

const fileName =
Date.now()+"-"+file.name;

const {error:uploadError} =
await supabase.storage
.from("desserts")
.upload(fileName,file);

if(uploadError){
alert(uploadError.message);
return;
}

const imageUrl =
`${SUPABASE_URL}/storage/v1/object/public/desserts/${fileName}`;

const {error} =
await supabase
.from("desserts")
.insert([{
name:
document.getElementById("name").value,

description:
document.getElementById("description").value,

category:
document.getElementById("category").value,

image_url:imageUrl
}]);

if(error){
alert(error.message);
return;
}

document.getElementById("status").innerHTML =
"Dessert Added Successfully";
}
</script>

</body>
</html>
